<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>waterfall-cad playground</title>
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/modern-normalize/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />

    <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer@4/dist/model-viewer.min.js"></script>
    <script async type="module" src="./playground.js"></script>
  </head>
  <body>
    <div id="spinner" class="spinner-overlay">
      <div class="spinner"></div>
    </div>
    <div class="app">
      <section class="pane">
        <header>
          <img src="./logo.svg" alt="" class="logo" />
          waterfall-cad playground
        </header>
        <div id="editor"></div>
      </section>

      <section class="pane right">
        <header>Controls / Output</header>
        <div class="controls">
          <input
            id="ghcArgs"
            type="text"
            value="-package waterfall-cad -package waterfall-cad-svg -package linear -v0"
          />
          <button id="loadBtn" disabled>Load…</button>
          <button id="runBtn" disabled>Run</button>
        </div>
        <div class="controls">
          <label for="exampleSelect">Examples</label>
          <select id="exampleSelect" disabled></select>
        </div>
        <div class="controls" id="solidControls" style="display: none">
          <label for="solidSelect">Solid</label>
          <select id="solidSelect" disabled></select>
        </div>
        <div class="controls">
          <button id="downloadBtn" disabled>Download</button>
          <select id="downloadFormat">
            <option value="stl">STL</option>
            <option value="step">STEP</option>
            <option value="glb">GLB</option>
          </select>
        </div>
        <div id="status">Loading...</div>
        <model-viewer
          id="viewer"
          camera-controls
          auto-rotate
          exposure="0.9"
          alt="rendered model"
        ></model-viewer>
        <div class="outputs" id="outputs" style="display: none">
          <div id="stdoutPanel">
            <div class="label">stdout</div>
            <textarea id="stdout" readonly></textarea>
          </div>
          <div id="stderrPanel">
            <div class="label">stderr</div>
            <textarea id="stderr" class="stderr" readonly></textarea>
          </div>
        </div>
      </section>
    </div>

    <dialog id="loadDialog">
      <form method="dialog">
        <label for="loadUrl">Load program from URL</label>
        <input
          id="loadUrl"
          type="text"
          placeholder="https://…/Example.hs"
        />
        <div class="dialog-buttons">
          <button value="ok">Load</button>
          <button value="cancel" formnovalidate>Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
