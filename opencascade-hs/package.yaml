name:                opencascade-hs
_version:            !include "../package-defaults.yaml"
version:             *version
github:              "joe-warren/opencascade-hs"
license:             LGPL-2.1
author:              "Joe Warren"
maintainer:          "josephmarkwarren@gmail.com"
copyright:           "2023 Joe Warren"

extra-source-files:
- LICENSE
- README.md
- CHANGELOG.md
- cpp/*.h

include-dirs:
- cpp

# The wasm build (see Dockerfile / WASM_BUILD_NOTES.md) compiles against an
# OCCT tree built with wasi-sdk at /OCCT, with C++ wasm-native exceptions.
# On wasm32 this package ships no C++ at all: the wrappers can't go in
# extra-libraries or cxx-sources because GHC's wasm backend would have to
# load them at compile time, and C++ exception handling only works when all
# C++ (wrappers, OCCT, libc++abi) is linked into a single wasm module. The
# hs_* FFI imports are left undefined and bound by the dynamic loader to the
# module that does contain them (see playground/build_playground.sh).
when:
- condition: arch(wasm32)
  then:
    include-dirs:
    - /OCCT/wasi_stubs
    - /OCCT/work/wasm/inc
    cxx-options:
    - "-Wno-#pragma-messages"
    - -fexceptions
    - -fwasm-exceptions
    - -mllvm
    - -wasm-use-legacy-eh=false
    - -DNo_Exception
    ghc-options:
    - -Wwarn=redundant-constraints
  else:
    include-dirs:
    - /usr/include/opencascade
    cxx-sources:
    - cpp/*.cpp
    extra-libraries:
    - stdc++
    - TKGeomBase
    - TKStd
    - TKG3d
    - TKG2d
    - TKHLR
    - TKMath
    - TKernel
    - TKBRep
    - TKOffset
    - TKFillet
    - TKBO
    - TKPrim
    - TKTopAlgo
    - TKDESTL
    - TKDESTEP
    - TKDEGLTF
    - TKDEOBJ
    - TKV3d
    - TKMesh
    - TKRWMesh
    - TKLCAF
    - TKXCAF
    - TKService
    - TKShHealing
    - TKXSBase

synopsis:            Thin Wrapper for the OpenCASCADE CAD Kernel
category:            Graphics,FFI

description:         Please see the README on GitHub at <https://github.com/joe-warren/opencascade-hs#readme>

dependencies:
- base >= 4.7 && < 5
- resourcet >= 1.2 && < 1.4

ghc-options: *ghc-options

cxx-options:
  - --std=c++17
  - -Wall
  - -Werror
  - -Wno-deprecated

library:
  source-dirs: src
